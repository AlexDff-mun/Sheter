<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — Shelter PVE</title>
<link rel="icon" type="image/x-icon" href="images/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --red:#cc1f1f; --ember:#e05a1a; --khaki:#b7a98d;
  --bg:#080707; --bg2:#0d0c0b; --text:#d4c9b5; --text-dim:#7a7060;
  --border:rgba(183,169,141,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden}

/* Сетка */
.grid-bg{position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(204,31,31,0.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(204,31,31,0.025) 1px,transparent 1px);
  background-size:60px 60px}

/* Частицы */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0}
.p{position:absolute;width:2px;height:2px;background:var(--red);border-radius:50%;opacity:0;
   animation:float var(--d,8s) var(--delay,0s) infinite ease-in-out}
@keyframes float{
  0%{transform:translateY(100vh) translateX(0);opacity:0}
  10%{opacity:var(--op,.35)}90%{opacity:var(--op,.35)}
  100%{transform:translateY(-10vh) translateX(var(--dx,20px));opacity:0}
}

/* Сканлайн */
.scanline{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px)}

/* Углы */
.corner{position:fixed;width:48px;height:48px;border-color:rgba(204,31,31,0.18);border-style:solid}
.corner-tl{top:1.5rem;left:1.5rem;border-width:1px 0 0 1px}
.corner-tr{top:1.5rem;right:1.5rem;border-width:1px 1px 0 0}
.corner-bl{bottom:1.5rem;left:1.5rem;border-width:0 0 1px 1px}
.corner-br{bottom:1.5rem;right:1.5rem;border-width:0 1px 1px 0}

/* Логотип */
.top-logo{
  position:fixed;top:0;left:0;right:0;z-index:10;
  padding:20px 32px;display:flex;align-items:center;gap:10px;
  background:linear-gradient(to bottom,rgba(8,7,7,0.8),transparent);
}
.top-logo img{width:36px;height:36px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(204,31,31,0.8))}
.top-logo-text{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase}
.top-logo-text em{color:var(--red);font-style:normal}

/* Основной контент */
.scene{
  position:relative;z-index:1;height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem
}

/* 404 глитч */
.big-404{position:relative;margin-bottom:1.5rem}
.glitch{
  font-family:'Oswald',sans-serif;font-size:clamp(7rem,20vw,15rem);font-weight:700;
  color:transparent;-webkit-text-stroke:1px rgba(204,31,31,0.25);
  letter-spacing:0.05em;line-height:1;position:relative;
  filter:drop-shadow(0 0 20px rgba(204,31,31,0.3)) drop-shadow(0 0 60px rgba(204,31,31,0.12));
  animation:glitch-skew 4s infinite linear alternate-reverse
}
.glitch::before,.glitch::after{
  content:'404';position:absolute;inset:0;
  font-family:'Oswald',sans-serif;font-size:inherit;font-weight:700;letter-spacing:inherit
}
.glitch::before{
  color:rgba(204,31,31,0.55);-webkit-text-stroke:0;
  animation:glitch-1 3s infinite;clip-path:polygon(0 0,100% 0,100% 35%,0 35%)
}
.glitch::after{
  color:rgba(91,155,213,0.35);-webkit-text-stroke:0;
  animation:glitch-2 3s infinite;clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%)
}
@keyframes glitch-skew{0%{transform:skew(0deg)}20%{transform:skew(-0.8deg)}40%{transform:skew(0.4deg)}100%{transform:skew(0deg)}}
@keyframes glitch-1{0%,95%{transform:translate(0)}96%{transform:translate(-3px,1px)}97%{transform:translate(3px,-1px)}100%{transform:translate(0)}}
@keyframes glitch-2{0%,93%{transform:translate(0)}94%{transform:translate(3px,2px)}96%{transform:translate(-3px,-1px)}100%{transform:translate(0)}}

.code-line{
  font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:0.2em;
  color:rgba(204,31,31,0.45);margin-bottom:2rem
}
.code-line span{color:var(--khaki);animation:blink 1.2s step-end infinite}
@keyframes blink{50%{opacity:0}}

.err-title{
  font-family:'Oswald',sans-serif;font-size:clamp(1.2rem,4vw,2rem);font-weight:600;
  letter-spacing:0.15em;color:var(--text);margin-bottom:0.8rem;text-transform:uppercase
}
.err-subtitle{
  font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim);
  letter-spacing:0.1em;margin-bottom:2.5rem;line-height:1.9;max-width:400px
}

.links{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.link-btn{
  font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;
  padding:10px 24px;text-decoration:none;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
  border:1px solid;transition:all 0.2s
}
.link-primary{background:rgba(204,31,31,0.12);color:var(--red);border-color:rgba(204,31,31,0.35)}
.link-primary:hover{background:rgba(204,31,31,0.25);border-color:var(--red)}
.link-secondary{background:rgba(183,169,141,0.06);color:var(--khaki);border-color:rgba(183,169,141,0.2)}
.link-secondary:hover{background:rgba(183,169,141,0.14)}

.redirect{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:2rem;letter-spacing:0.1em}
.redirect b{color:var(--red)}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="scanline"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div class="particles" id="particles"></div>

<a href="index.html" class="top-logo">
  <img src="images/SHL_PVE.png" alt="Shelter PVE" onerror="this.style.display='none'">
  <span class="top-logo-text">Shelter <em>PVE</em></span>
</a>

<div class="scene">
  <div class="big-404">
    <div class="glitch">404</div>
  </div>

  <div class="code-line">// ERROR: PAGE_NOT_FOUND <span>_</span></div>

  <div class="err-title">Страница не найдена</div>
  <div class="err-subtitle">
    Похоже ты попал не туда.<br>
    Эта территория необитаема —<br>возвращайся в безопасную зону.
  </div>

  <div class="links">
    <a href="index.html" class="link-btn link-primary">← На главную</a>
    <a href="map.html" class="link-btn link-secondary">Карта</a>
    <a href="faq.html" class="link-btn link-secondary">FAQ</a>
  </div>

  <div class="redirect">авто-редирект через <b id="countdown">10</b> сек</div>
</div>

<script>
const p = document.getElementById('particles');
for (let i = 0; i < 20; i++) {
  const el = document.createElement('div');
  el.className = 'p';
  el.style.cssText = `left:${Math.random()*100}%;--d:${6+Math.random()*8}s;--delay:${Math.random()*8}s;--dx:${(Math.random()-0.5)*60}px;--op:${0.15+Math.random()*0.25}`;
  p.appendChild(el);
}
let n = 10;
const cd = document.getElementById('countdown');
const t = setInterval(() => { n--; cd.textContent = n; if (n <= 0) { clearInterval(t); location.href = 'index.html'; } }, 1000);
</script>
</body>
</html>
