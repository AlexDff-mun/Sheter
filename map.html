<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Карта — Shelter PVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#cc1f1f;--khaki:#b7a98d;--bg:#080707;
  --text:#d4c9b5;--text-dim:#6a6058;--rad:#7ec8a0;
  --mono:'Share Tech Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
.topbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:52px;background:rgba(8,7,7,0.96);border-bottom:1px solid rgba(204,31,31,0.2);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:0 1.2rem;gap:0.8rem;}
.topbar-logo{display:flex;align-items:center;gap:0.6rem;text-decoration:none;}
.topbar-logo img{height:28px;width:28px;object-fit:contain;}
.topbar-logo-text{font-family:'Oswald',sans-serif;font-size:0.95rem;font-weight:600;letter-spacing:0.12em;color:var(--text);}
.topbar-logo-text span{color:var(--red);}
.topbar-back{font-family:var(--mono);font-size:0.62rem;letter-spacing:0.12em;color:var(--text-dim);text-decoration:none;transition:color 0.2s;white-space:nowrap;}
.topbar-back:hover{color:var(--red);}
.topbar-title{font-family:'Oswald',sans-serif;font-size:0.7rem;letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase;flex:1;text-align:center;}
.filters{position:fixed;top:52px;left:0;right:0;z-index:900;background:rgba(8,7,7,0.92);border-bottom:1px solid rgba(204,31,31,0.1);backdrop-filter:blur(8px);padding:0.42rem 1rem;display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;}
.filter-btn{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.3rem 0.72rem;background:transparent;border:1px solid rgba(255,255,255,0.07);color:var(--text-dim);cursor:pointer;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);transition:all 0.2s;white-space:nowrap;}
.filter-btn:hover{border-color:rgba(204,31,31,0.3);color:var(--text);}
.filter-btn.active{border-color:var(--c,var(--red));color:var(--c,var(--red));background:rgba(204,31,31,0.07);}
#map{position:fixed;top:calc(52px + 35px);left:0;right:0;bottom:0;}
.leaflet-container{background:#06080a!important;}
.leaflet-control-zoom{border:1px solid rgba(204,31,31,0.25)!important;background:rgba(8,7,7,0.95)!important;}
.leaflet-control-zoom a{background:rgba(8,7,7,0.95)!important;color:var(--khaki)!important;border-color:rgba(204,31,31,0.15)!important;font-family:var(--mono)!important;}
.leaflet-control-zoom a:hover{color:var(--red)!important;background:rgba(204,31,31,0.1)!important;}
.leaflet-control-attribution{display:none!important;}
.leaflet-popup-content-wrapper{background:rgba(8,7,7,0.97)!important;border:1px solid rgba(204,31,31,0.3)!important;border-radius:0!important;color:var(--text)!important;box-shadow:0 0 24px rgba(204,31,31,0.15)!important;}
.leaflet-popup-tip{background:rgba(8,7,7,0.97)!important;}
.leaflet-popup-content{margin:12px 16px!important;min-width:150px;}
.popup-title{font-family:'Oswald',sans-serif;font-size:0.95rem;font-weight:600;color:var(--text);margin-bottom:3px;}
.popup-type{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:5px;}
.popup-sz{font-family:var(--mono);font-size:0.58rem;color:var(--rad);margin-top:3px;}
.popup-coords{font-family:var(--mono);font-size:0.58rem;color:var(--text-dim);border-top:1px solid rgba(255,255,255,0.05);padding-top:5px;margin-top:5px;}
.leaflet-popup-close-button{color:var(--text-dim)!important;}
.leaflet-popup-close-button:hover{color:var(--red)!important;}
.legend-btn{position:fixed;bottom:1rem;right:1rem;z-index:900;font-family:var(--mono);font-size:0.58rem;padding:0.4rem 0.8rem;background:rgba(8,7,7,0.92);border:1px solid rgba(204,31,31,0.2);color:var(--text-dim);cursor:pointer;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);transition:all .2s;}
.legend-btn:hover{color:var(--red);}
.map-legend{position:fixed;bottom:1rem;right:1rem;z-index:901;background:rgba(8,7,7,0.96);border:1px solid rgba(204,31,31,0.2);padding:0.9rem 1.1rem;min-width:175px;display:none;cursor:pointer;}
.map-legend.show{display:block;}
.legend-title{font-family:'Oswald',sans-serif;font-size:0.65rem;letter-spacing:0.2em;color:var(--red);margin-bottom:0.6rem;text-transform:uppercase;}
.legend-item{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.3rem;font-family:var(--mono);font-size:0.6rem;color:var(--khaki);}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.leg-ring{width:12px;height:12px;border-radius:50%;border:1.5px dashed;flex-shrink:0;}
#coords{position:fixed;bottom:1rem;left:1rem;z-index:900;font-family:var(--mono);font-size:0.58rem;color:rgba(183,169,141,0.35);background:rgba(8,7,7,0.7);padding:0.3rem 0.6rem;pointer-events:none;}
@media(max-width:600px){.topbar-title{display:none;}.filters{padding:0.35rem 0.5rem;gap:0.25rem;}.filter-btn{font-size:0.5rem;padding:0.28rem 0.5rem;}}
</style>
</head>
<body>
<header class="topbar">
  <a href="index.html" class="topbar-logo">
    <img src="images/SHL_PVE.png" alt="Shelter PVE">
    <span class="topbar-logo-text">SHELTER <span>PVE</span></span>
  </a>
  <div class="topbar-title">🗺 КАРТА — CHERNARUS+</div>
  <a href="index.html" class="topbar-back">← НА ГЛАВНУЮ</a>
</header>
<div class="filters">
  <button class="filter-btn active" data-cat="all" style="--c:var(--text)">ВСЕ</button>
  <button class="filter-btn" data-cat="trader" style="--c:#e0a020">🛒 ТРЕЙДЕРЫ</button>
  <button class="filter-btn" data-cat="craft" style="--c:#5b9bd5">🔧 КРАФТ</button>
  <button class="filter-btn" data-cat="danger" style="--c:var(--red)">💀 ОПАСНОСТЬ</button>
  <button class="filter-btn" data-cat="radiation" style="--c:var(--rad)">☢ РАДИАЦИЯ</button>
  <button class="filter-btn" data-cat="safezone" style="--c:#7ec8a0">🛡 СЕЙФЗОНЫ</button>
</div>
<div id="map"></div>
<div id="coords">X: — / Z: —</div>
<button class="legend-btn" id="legend-btn" onclick="toggleLegend()">📋 ЛЕГЕНДА</button>
<div class="map-legend" id="map-legend" onclick="toggleLegend()">
  <div class="legend-title">Легенда</div>
  <div class="legend-item"><div class="leg-dot" style="background:#e0a020"></div>Трейдер</div>
  <div class="legend-item"><div class="leg-dot" style="background:#5b9bd5"></div>Инженерный пост</div>
  <div class="legend-item"><div class="leg-dot" style="background:#cc1f1f"></div>Опасная зона</div>
  <div class="legend-item"><div class="leg-dot" style="background:#7ec8a0"></div>Радиация</div>
  <div class="legend-item"><div class="leg-ring" style="border-color:#7ec8a0"></div>Сейфзона</div>
</div>
<script>
// ══ DayZ Chernarus+ = 15360 × 15360 метров ══
// Leaflet CRS.Simple: lat = Z (север), lng = X (восток)
// Bounds: юго-запад [0,0] → северо-восток [15360,15360]

const MAP_M = 15360;
// В CRS.Simple ось Y идёт вверх от нуля.
// Кладём карту симметрично от -MAP_M/2 до MAP_M/2
const HALF = MAP_M / 2;
const BOUNDS = [[-HALF, -HALF], [HALF, HALF]];

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -3,
  maxZoom: 3,
  zoomSnap: 0.25,
  zoomControl: true,
  attributionControl: false,
  maxBounds: [[-HALF - 500, -HALF - 500], [HALF + 500, HALF + 500]],
  maxBoundsViscosity: 0.85
});

L.imageOverlay('images/map_chernarus.jpg', BOUNDS, {
  opacity: 0.92,
  interactive: false
}).addTo(map);

map.fitBounds(BOUNDS);

// Конвертация DayZ X,Z → Leaflet LatLng
// DayZ: X,Z ∈ [0..15360], центр = 7680
// Leaflet: lat,lng ∈ [-7680..7680]
function toLL(x, z) {
  return L.latLng(z - HALF, x - HALF);
}

// ══ МАРКЕРЫ ══
const MARKERS = [
  { text:"Лагерь выживших",    sub:"Trader",              cat:"trader",    icon:"🏕", color:"#e0a020", x:8142.7,  z:10922.0, sz:true  },
  { text:"Терминал",           sub:"Trader",              cat:"trader",    icon:"🔫", color:"#e0a020", x:14301.4, z:13253.1, sz:true  },
  { text:"Егерь",              sub:"Trader",              cat:"trader",    icon:"🎣", color:"#e0a020", x:1230.3,  z:6473.0,  sz:true  },
  { text:"Инженерный пост",    sub:"Крафт",               cat:"craft",     icon:"🔧", color:"#5b9bd5", x:3092.86, z:10827.0, sz:true  },
  { text:"Алькатрас",          sub:"Опасная зона",        cat:"danger",    icon:"💀", color:"#cc1f1f", x:2680.0,  z:1280.0,  sz:false },
  { text:"Радар",              sub:"Опасная зона",        cat:"danger",    icon:"📡", color:"#cc1f1f", x:560.0,   z:13680.0, sz:false },
  { text:"Радиация",           sub:"Радиационная зона",   cat:"radiation", icon:"☢", color:"#7ec8a0", x:8599.7,  z:13277.3, sz:false },
  { text:"Радиация (Павлово)", sub:"Радиационная зона",   cat:"radiation", icon:"☢", color:"#7ec8a0", x:2166.31, z:3362.51, sz:false },
];
const SAFEZONES = [
  { x:8122.0,  z:10944.3, r:90,  label:"Лагерь выживших" },
  { x:14305.3, z:13220.1, r:108, label:"Терминал" },
  { x:1230.3,  z:6473.0,  r:50,  label:"Егерь" },
  { x:3092.86, z:10827.0, r:50,  label:"Инженерный пост" },
];

function makeIcon(emoji, color) {
  return L.divIcon({
    html: `<div style="filter:drop-shadow(0 0 5px ${color});width:36px;height:44px">
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="44" viewBox="0 0 36 44">
        <path d="M18 2C9.2 2 2 9.2 2 18c0 11 16 26 16 26S34 29 34 18C34 9.2 26.8 2 18 2z"
          fill="${color}" fill-opacity="0.2" stroke="${color}" stroke-width="1.5"/>
        <circle cx="18" cy="18" r="11" fill="${color}" fill-opacity="0.25" stroke="${color}" stroke-width="1"/>
        <text x="18" y="23" text-anchor="middle" font-size="13">${emoji}</text>
      </svg></div>`,
    iconSize:[36,44], iconAnchor:[18,44], popupAnchor:[0,-46], className:''
  });
}

const allLayers = [];
MARKERS.forEach(m => {
  const marker = L.marker(toLL(m.x, m.z), { icon: makeIcon(m.icon, m.color) })
    .bindPopup(`
      <div class="popup-title">${m.text}</div>
      <div class="popup-type" style="color:${m.color}">${m.icon} ${m.sub}</div>
      ${m.sz ? '<div class="popup-sz">🛡 Сейфзона активна</div>' : ''}
      <div class="popup-coords">X: ${m.x.toFixed(0)} / Z: ${m.z.toFixed(0)}</div>
    `, { maxWidth:210 });
  marker.addTo(map);
  allLayers.push({ layer:marker, cat:m.cat });
});

const szLayers = [];
SAFEZONES.forEach(sz => {
  const c = L.circle(toLL(sz.x, sz.z), {
    radius: sz.r, color:'#7ec8a0', fillColor:'#7ec8a0',
    fillOpacity:0.08, weight:1.5, dashArray:'6,5'
  }).bindPopup(`
    <div class="popup-title">🛡 Сейфзона</div>
    <div class="popup-type" style="color:#7ec8a0">${sz.label}</div>
    <div class="popup-coords">Радиус: ${sz.r} м</div>
  `, { maxWidth:180 });
  c.addTo(map);
  szLayers.push(c);
});

// ══ ФИЛЬТРЫ ══
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cat = btn.dataset.cat;
    allLayers.forEach(({layer,cat:mc}) => cat==='all'||cat===mc ? layer.addTo(map) : map.removeLayer(layer));
    szLayers.forEach(l => cat==='all'||cat==='safezone' ? l.addTo(map) : map.removeLayer(l));
  });
});

// ══ КООРДИНАТЫ ══
map.on('mousemove', e => {
  const x = (e.latlng.lng + HALF).toFixed(0);
  const z = (e.latlng.lat + HALF).toFixed(0);
  document.getElementById('coords').textContent = `X: ${x}  Z: ${z}`;
});

// ══ ЛЕГЕНДА ══
function toggleLegend() {
  const show = document.getElementById('map-legend').classList.toggle('show');
  document.getElementById('legend-btn').style.display = show ? 'none' : 'block';
}
</script>
</body>
</html>
