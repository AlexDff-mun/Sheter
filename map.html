<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Карта — Shelter PVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Share+Tech+Mono&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#cc1f1f; --red-dark:#8b1010; --ember:#e05a1a;
  --khaki:#b7a98d; --khaki-dark:#7a6a53;
  --bg:#080707; --bg2:#0f0d0d; --bg3:#161212;
  --text:#d4c9b5; --text-dim:#6a6058; --rad:#7ec8a0;
  --mono:'Share Tech Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  height:52px;
  background:rgba(8,7,7,0.95);
  border-bottom:1px solid rgba(204,31,31,0.2);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.2rem;gap:0.8rem;
}
.topbar-logo{display:flex;align-items:center;gap:0.6rem;text-decoration:none;}
.topbar-logo img{height:28px;width:28px;object-fit:contain;}
.topbar-logo-text{
  font-family:'Oswald',sans-serif;font-size:0.95rem;
  font-weight:600;letter-spacing:0.12em;color:var(--text);
}
.topbar-logo-text span{color:var(--red);}
.topbar-back{
  font-family:var(--mono);font-size:0.62rem;letter-spacing:0.12em;
  color:var(--text-dim);text-decoration:none;
  display:flex;align-items:center;gap:0.4rem;transition:color 0.2s;
  white-space:nowrap;
}
.topbar-back:hover{color:var(--red);}
.topbar-title{
  font-family:'Oswald',sans-serif;font-size:0.7rem;
  letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase;
  flex:1;text-align:center;
}

/* ── FILTERS ── */
.filters{
  position:fixed;top:52px;left:0;right:0;z-index:900;
  background:rgba(8,7,7,0.9);
  border-bottom:1px solid rgba(204,31,31,0.1);
  backdrop-filter:blur(8px);
  padding:0.5rem 1rem;
  display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;
}
.filter-btn{
  font-family:var(--mono);font-size:0.58rem;letter-spacing:0.12em;
  text-transform:uppercase;padding:0.35rem 0.8rem;
  background:transparent;border:1px solid rgba(255,255,255,0.08);
  color:var(--text-dim);cursor:pointer;
  clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
  transition:all 0.2s;white-space:nowrap;
  display:flex;align-items:center;gap:0.4rem;
}
.filter-btn:hover{border-color:rgba(204,31,31,0.3);color:var(--text);}
.filter-btn.active{border-color:var(--c,var(--red));color:var(--c,var(--red));background:rgba(204,31,31,0.08);}
.filter-label{
  font-family:var(--mono);font-size:0.55rem;color:var(--text-dim);
  letter-spacing:0.1em;margin-right:0.3rem;
}

/* ── MAP ── */
#map{
  position:fixed;
  top:calc(52px + 38px);
  left:0;right:0;bottom:0;
  background:#080707;
}

/* ── LEAFLET OVERRIDES ── */
.leaflet-container{background:#080707 !important;}
.leaflet-control-zoom{border:1px solid rgba(204,31,31,0.25) !important;background:rgba(10,8,8,0.95) !important;}
.leaflet-control-zoom a{
  background:rgba(10,8,8,0.95) !important;color:var(--khaki) !important;
  border-color:rgba(204,31,31,0.15) !important;
  font-family:var(--mono) !important;
  transition:color 0.2s,background 0.2s;
}
.leaflet-control-zoom a:hover{color:var(--red) !important;background:rgba(204,31,31,0.1) !important;}

/* ── CUSTOM POPUP ── */
.leaflet-popup-content-wrapper{
  background:rgba(10,8,8,0.97) !important;
  border:1px solid rgba(204,31,31,0.3) !important;
  border-radius:0 !important;
  color:var(--text) !important;
  box-shadow:0 0 30px rgba(204,31,31,0.2) !important;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
.leaflet-popup-tip{background:rgba(204,31,31,0.3) !important;}
.leaflet-popup-content{margin:12px 16px !important;min-width:160px;}
.popup-title{
  font-family:'Oswald',sans-serif;font-size:0.95rem;
  font-weight:600;letter-spacing:0.08em;
  color:var(--text);margin-bottom:4px;
}
.popup-type{
  font-family:var(--mono);font-size:0.58rem;letter-spacing:0.15em;
  text-transform:uppercase;margin-bottom:8px;
}
.popup-coords{
  font-family:var(--mono);font-size:0.6rem;color:var(--text-dim);
  border-top:1px solid rgba(255,255,255,0.05);
  padding-top:6px;margin-top:6px;
}
.popup-sz{
  font-family:var(--mono);font-size:0.6rem;
  color:var(--rad);margin-top:4px;
}
.leaflet-popup-close-button{color:var(--text-dim) !important;font-size:16px !important;}
.leaflet-popup-close-button:hover{color:var(--red) !important;}

/* ── LEGEND ── */
.map-legend{
  position:fixed;bottom:1rem;right:1rem;z-index:900;
  background:rgba(8,7,7,0.92);
  border:1px solid rgba(204,31,31,0.15);
  padding:0.8rem 1rem;
  min-width:160px;
  font-size:0.65rem;
  display:none;
}
.map-legend.show{display:block;}
.legend-title{
  font-family:'Oswald',sans-serif;font-size:0.65rem;
  letter-spacing:0.2em;color:var(--red);
  margin-bottom:0.6rem;text-transform:uppercase;
}
.legend-item{
  display:flex;align-items:center;gap:0.5rem;
  margin-bottom:0.35rem;color:var(--khaki);
  font-family:var(--mono);
}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.legend-line{width:10px;height:2px;border:1px dashed;flex-shrink:0;}
.legend-btn{
  position:fixed;bottom:1rem;right:1rem;z-index:901;
  font-family:var(--mono);font-size:0.58rem;letter-spacing:0.12em;
  padding:0.4rem 0.7rem;
  background:rgba(8,7,7,0.92);border:1px solid rgba(204,31,31,0.2);
  color:var(--text-dim);cursor:pointer;
  clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
  transition:all 0.2s;
}
.legend-btn:hover{color:var(--red);}

/* ── MOBILE ── */
@media(max-width:600px){
  .topbar-title{display:none;}
  .filters{gap:0.3rem;padding:0.4rem 0.6rem;}
  .filter-btn{font-size:0.52rem;padding:0.3rem 0.55rem;}
  .filter-label{display:none;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <a href="index.html" class="topbar-logo">
    <img src="images/SHL_PVE.png" alt="Shelter PVE">
    <span class="topbar-logo-text">SHELTER <span>PVE</span></span>
  </a>
  <div class="topbar-title">🗺 КАРТА СЕРВЕРА — CHERNARUS+</div>
  <a href="index.html" class="topbar-back">← НА ГЛАВНУЮ</a>
</header>

<!-- FILTERS -->
<div class="filters">
  <span class="filter-label">ФИЛЬТР:</span>
  <button class="filter-btn active" data-cat="all" style="--c:var(--text)">ВСЕ</button>
  <button class="filter-btn" data-cat="trader" style="--c:#e0a020">🛒 ТРЕЙДЕРЫ</button>
  <button class="filter-btn" data-cat="craft" style="--c:#5b9bd5">🔧 КРАФТ</button>
  <button class="filter-btn" data-cat="danger" style="--c:var(--red)">⚠ ОПАСНОСТЬ</button>
  <button class="filter-btn" data-cat="radiation" style="--c:var(--rad)">☢ РАДИАЦИЯ</button>
  <button class="filter-btn" data-cat="safezone" style="--c:#7ec8a0">🛡 СЕЙФЗОНЫ</button>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- LEGEND BTN -->
<button class="legend-btn" id="legend-btn" onclick="toggleLegend()">📋 ЛЕГЕНДА</button>
<div class="map-legend" id="map-legend">
  <div class="legend-title">Легенда</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e0a020"></div>Трейдер</div>
  <div class="legend-item"><div class="legend-dot" style="background:#5b9bd5"></div>Крафт</div>
  <div class="legend-item"><div class="legend-dot" style="background:#cc1f1f"></div>Опасная зона</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7ec8a0"></div>Радиация</div>
  <div class="legend-item"><div class="legend-line" style="border-color:#7ec8a0;background:rgba(126,200,160,0.15)"></div>Сейфзона</div>
</div>

<script>
// ═══════════════════════════════════════
//  ДАННЫЕ С СЕРВЕРА
// ═══════════════════════════════════════
const SERVER_MARKERS = [
  { id:"trader_camp",  text:"Лагерь выживших", sub:"Trader",          cat:"trader",    icon:"🏕", color:"#e0a020", x:8142.7,  z:10922.0, sz:true  },
  { id:"trader_term",  text:"Терминал",         sub:"Trader",          cat:"trader",    icon:"🔫", color:"#e0a020", x:14301.4, z:13253.1, sz:true  },
  { id:"trader_eger",  text:"Егерь",            sub:"Trader",          cat:"trader",    icon:"🎣", color:"#e0a020", x:1230.3,  z:6473.0,  sz:true  },
  { id:"craft",        text:"Инженерный пост",  sub:"Крафт",           cat:"craft",     icon:"🔧", color:"#5b9bd5", x:3092.86, z:10827.0, sz:true  },
  { id:"alcatraz",     text:"Алькатрас",        sub:"Опасная зона",    cat:"danger",    icon:"💀", color:"#cc1f1f", x:2680.0,  z:1280.0,  sz:false },
  { id:"radar",        text:"Радар",            sub:"Опасная зона",    cat:"danger",    icon:"📡", color:"#cc1f1f", x:560.0,   z:13680.0, sz:false },
  { id:"rad1",         text:"Радиация (NW)",    sub:"Радиационная зона",cat:"radiation", icon:"☢", color:"#7ec8a0", x:8599.7,  z:13277.3, sz:false },
  { id:"rad2",         text:"Радиация (Павлово)",sub:"Радиационная зона",cat:"radiation",icon:"☢", color:"#7ec8a0", x:2166.31, z:3362.51, sz:false },
];

const SAFEZONES = [
  { x:8122.0,   z:10944.3, r:90,  label:"Лагерь выживших" },
  { x:14305.3,  z:13220.1, r:108, label:"Терминал" },
  { x:1230.3,   z:6473.0,  r:50,  label:"Егерь" },
  { x:3092.86,  z:10827.0, r:50,  label:"Инженерный пост" },
];

// ═══════════════════════════════════════
//  КАРТА — Chernarus+ 15360x15360m
// ═══════════════════════════════════════
const MAP_SIZE = 15360;

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -3,
  maxZoom: 2,
  zoomSnap: 0.25,
  attributionControl: false,
});

// Тайлы карты Chernarus от сообщества
// Fallback: одиночный overlay если тайлы недоступны
const bounds = [[0, 0], [MAP_SIZE, MAP_SIZE]];

// Слой карты — используем публично доступные тайлы Chernarus+
// https://tiles.izurvive.com/ недоступны напрямую, используем image overlay
const mapImg = L.imageOverlay(
  'https://raw.githubusercontent.com/BattlefieldRedux/DayZ-Map-Resources/master/chernarus/map.jpg',
  bounds,
  { opacity: 0.9 }
);

// Резервный фон если изображение не загрузилось
const fallbackImg = L.imageOverlay(
  'https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/DayZ_-_Chernarus_Map.jpg/1280px-DayZ_-_Chernarus_Map.jpg',
  bounds,
  { opacity: 0.85 }
);

mapImg.on('error', () => fallbackImg.addTo(map));
mapImg.addTo(map);

map.fitBounds(bounds);

// ═══════════════════════════════════════
//  КОНВЕРТАЦИЯ КООРДИНАТ
//  DayZ [X, Z] → Leaflet [lat=Z, lng=X]
// ═══════════════════════════════════════
function dayZtoLatLng(x, z) {
  return L.latLng(z, x);
}

// ═══════════════════════════════════════
//  КАСТОМНЫЕ ИКОНКИ
// ═══════════════════════════════════════
function makeIcon(emoji, color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="44" viewBox="0 0 36 44">
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path d="M18 2 C9.16 2 2 9.16 2 18 C2 29 18 42 18 42 C18 42 34 29 34 18 C34 9.16 26.84 2 18 2Z"
      fill="${color}" fill-opacity="0.15" stroke="${color}" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="18" cy="18" r="12" fill="${color}" fill-opacity="0.2" stroke="${color}" stroke-width="1"/>
    <text x="18" y="23" text-anchor="middle" font-size="14">${emoji}</text>
  </svg>`;
  return L.divIcon({
    html: `<div style="filter:drop-shadow(0 0 6px ${color})">${svg}</div>`,
    iconSize: [36, 44], iconAnchor: [18, 42], popupAnchor: [0, -44],
    className: ''
  });
}

// ═══════════════════════════════════════
//  МАРКЕРЫ
// ═══════════════════════════════════════
const markerLayers = {};
const allLayers = [];

SERVER_MARKERS.forEach(m => {
  const latlng = dayZtoLatLng(m.x, m.z);
  const icon = makeIcon(m.icon, m.color);

  const popup = `
    <div class="popup-title">${m.text}</div>
    <div class="popup-type" style="color:${m.color}">${m.icon} ${m.sub}</div>
    ${m.sz ? '<div class="popup-sz">🛡 Сейфзона активна</div>' : ''}
    <div class="popup-coords">X: ${m.x.toFixed(1)} / Z: ${m.z.toFixed(1)}</div>
  `;

  const marker = L.marker(latlng, { icon })
    .bindPopup(popup, { maxWidth: 220 });

  if (!markerLayers[m.cat]) markerLayers[m.cat] = [];
  markerLayers[m.cat].push(marker);
  allLayers.push({ marker, cat: m.cat });
  marker.addTo(map);
});

// ═══════════════════════════════════════
//  СЕЙФЗОНЫ — окружности
// ═══════════════════════════════════════
const safezoneLayers = [];

SAFEZONES.forEach(sz => {
  const center = dayZtoLatLng(sz.x, sz.z);

  // Заливка
  const fill = L.circle(center, {
    radius: sz.r,
    color: '#7ec8a0',
    fillColor: '#7ec8a0',
    fillOpacity: 0.07,
    weight: 1.5,
    dashArray: '5,5',
    className: 'safezone-layer'
  }).bindPopup(`
    <div class="popup-title">🛡 Сейфзона</div>
    <div class="popup-type" style="color:#7ec8a0">${sz.label}</div>
    <div class="popup-coords">Радиус: ${sz.r}м</div>
  `);

  safezoneLayers.push(fill);
  fill.addTo(map);
});

// ═══════════════════════════════════════
//  ФИЛЬТРЫ
// ═══════════════════════════════════════
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const cat = btn.dataset.cat;

    // Маркеры
    allLayers.forEach(({ marker, cat: mc }) => {
      if (cat === 'all' || cat === mc) {
        if (!map.hasLayer(marker)) marker.addTo(map);
      } else {
        if (map.hasLayer(marker)) map.removeLayer(marker);
      }
    });

    // Сейфзоны
    safezoneLayers.forEach(l => {
      if (cat === 'all' || cat === 'safezone') {
        if (!map.hasLayer(l)) l.addTo(map);
      } else {
        if (map.hasLayer(l)) map.removeLayer(l);
      }
    });
  });
});

// ═══════════════════════════════════════
//  ЛЕГЕНДА
// ═══════════════════════════════════════
function toggleLegend() {
  const leg = document.getElementById('map-legend');
  const btn = document.getElementById('legend-btn');
  const show = leg.classList.toggle('show');
  btn.style.display = show ? 'none' : 'block';
}
document.getElementById('map-legend').addEventListener('click', () => {
  document.getElementById('map-legend').classList.remove('show');
  document.getElementById('legend-btn').style.display = 'block';
});

// ═══════════════════════════════════════
//  КООРДИНАТЫ КУРСОРА (для отладки)
// ═══════════════════════════════════════
const coordsDiv = document.createElement('div');
coordsDiv.style.cssText = `
  position:fixed;bottom:1rem;left:1rem;z-index:900;
  font-family:var(--mono,monospace);font-size:0.6rem;
  color:rgba(183,169,141,0.4);pointer-events:none;
  background:rgba(8,7,7,0.7);padding:0.3rem 0.6rem;
`;
document.body.appendChild(coordsDiv);

map.on('mousemove', e => {
  coordsDiv.textContent = `X: ${e.latlng.lng.toFixed(0)}  Z: ${e.latlng.lat.toFixed(0)}`;
});
</script>
</body>
</html>
